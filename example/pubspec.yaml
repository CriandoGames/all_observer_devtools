name: all_observer_devtools_example
description: >-
  Demo app for all_observer_devtools: initializes the runtime bridge and
  exercises Observable/Computed/collections/workers/scopes so the DevTools
  extension panel (under ../extension/devtools_source) has real data to
  show when opened from Flutter DevTools' Extensions tab.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  # Same git ref as the bridge and the extension source, so all three
  # packages in this repo track one all_observer revision.
  all_observer:
    git:
      url: https://github.com/CriandoGames/all_observer.git
      ref: protocol-v1
  # The runtime bridge this whole repo is about — path dependency because
  # this example always exercises the bridge exactly as checked out here,
  # never a published version.
  all_observer_devtools:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
