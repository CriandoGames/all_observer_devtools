name: all_observer_devtools
description: >-
  Flutter DevTools integration for all_observer: an opt-in, read-only runtime
  bridge from the Observer Protocol to a Flutter DevTools extension panel.
version: 0.1.0
homepage: https://github.com/CriandoGames/all_observer_devtools
repository: https://github.com/CriandoGames/all_observer_devtools
issue_tracker: https://github.com/CriandoGames/all_observer_devtools/issues

environment:
  sdk: ^3.9.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  all_observer:
    git:
      url: https://github.com/CriandoGames/all_observer.git
      ref: protocol-v1
  meta: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

